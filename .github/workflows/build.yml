name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller colorama

      # Se você ainda não adicionou o colorama manualmente no main.py, esta etapa insere automaticamente
      - name: Garantir colorama (opcional)
        run: |
          $code = Get-Content -Path main.py -Raw
          if ($code -notmatch "from colorama import init") {
            $newCode = "from colorama import init`ninit()`n`n$code"
            Set-Content -Path main.py -Value $newCode
          }

      - name: Gerar .exe com ícone
        run: |
          pyinstaller --onefile --console --name GuessGame --icon=momozihlinda.ico main.py

      - name: Upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: GuessGame-exe
          path: dist/GuessGame.exe

      - name: Anexar à Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GuessGame.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
